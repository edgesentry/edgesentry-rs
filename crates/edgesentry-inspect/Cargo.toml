[package]
name = "edgesentry-inspect"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
description   = "Edge-first 3D scan vs. reference deviation detection for construction and maritime inspection"
keywords      = ["inspection", "point-cloud", "deviation", "ifc", "digital-twin"]
categories    = ["science", "computer-vision", "embedded"]
documentation = "https://edgesentry.github.io/edgesentry-rs/inspect/en/"

[lib]
name = "edgesentry_inspect"
path = "src/lib.rs"

[dependencies]
trilink-core = { path = "../../../trilink-core" }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
thiserror = "2"
kiddo = "4"

[dev-dependencies]
tempfile = "3"
