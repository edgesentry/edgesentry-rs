name: Release

on:
  workflow_dispatch:

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  CARGO_REGISTRIES_CRATES_IO_PROTOCOL: sparse

jobs:
  create_tag:
    name: Bump version and create tag
    uses: ./.github/workflows/auto-version-tag.yml
    permissions:
      contents: write

  quality_gate:
    name: Quality Gate
    runs-on: ubuntu-latest
    needs: create_tag
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.create_tag.outputs.tag_name }}

      - name: Setup Rust
        run: rustup update stable && rustup default stable

      - name: Cache Rust artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Build (release)
        run: cargo build --workspace --release --locked

      - name: Install cargo-deny
        run: cargo install cargo-deny --locked

      - name: Unit tests + license check
        run: ./scripts/run_unit_and_license_check.sh

      - name: Clippy
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

  publish_crates:
    name: Publish crates.io packages
    runs-on: ubuntu-latest
    needs: [create_tag, quality_gate]
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.create_tag.outputs.tag_name }}

      - name: Setup Rust
        run: rustup update stable && rustup default stable

      - name: Cache Rust artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Login crates.io
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}
        run: |
          if [ -z "${CARGO_REGISTRY_TOKEN}" ]; then
            echo "CRATES_IO_TOKEN secret is required for release workflow"
            exit 1
          fi

      - name: Publish crates in dependency order
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}
        run: |
          publish_if_missing() {
            crate="$1"
            version="$(cargo metadata --no-deps --format-version 1 | python3 -c "import json,sys; data=json.load(sys.stdin); print(next(p['version'] for p in data['packages'] if p['name']=='$crate'))")"
            url="https://crates.io/api/v1/crates/${crate}/${version}"

            if curl --silent --show-error --fail "$url" >/dev/null 2>&1; then
              echo "${crate}@${version} already exists on crates.io. Skipping publish."
              return 0
            fi

            echo "Publishing ${crate}@${version} ..."
            cargo publish --locked -p "$crate"
          }

          publish_if_missing edgesentry-rs

  build_cli_binaries:
    name: Build eds (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    needs: [create_tag, quality_gate]
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary_name: eds
            archive_ext: tar.gz
          - os: macos-latest
            target: aarch64-apple-darwin
            binary_name: eds
            archive_ext: tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            binary_name: eds.exe
            archive_ext: zip

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.create_tag.outputs.tag_name }}

      - name: Setup Rust (target)
        run: rustup update stable && rustup default stable && rustup target add ${{ matrix.target }}

      - name: Cache Rust artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-${{ matrix.target }}-cargo-

      - name: Build eds release binary
        run: cargo build --release --locked -p edgesentry-rs --target ${{ matrix.target }}

      - name: Package binary (unix)
        if: runner.os != 'Windows'
        shell: bash
        env:
          TAG_NAME: ${{ needs.create_tag.outputs.tag_name }}
        run: |
          ASSET_NAME="eds-${TAG_NAME}-${{ matrix.target }}.tar.gz"
          mkdir -p dist
          cp "target/${{ matrix.target }}/release/${{ matrix.binary_name }}" ./dist/
          tar -C dist -czf "$ASSET_NAME" "${{ matrix.binary_name }}"
          echo "ASSET_NAME=$ASSET_NAME" >> "$GITHUB_ENV"

      - name: Package binary (windows)
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          TAG_NAME: ${{ needs.create_tag.outputs.tag_name }}
        run: |
          $tag = "${env:TAG_NAME}"
          $asset = "eds-$tag-${{ matrix.target }}.zip"
          New-Item -ItemType Directory -Path dist -Force | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/${{ matrix.binary_name }}" "dist/${{ matrix.binary_name }}"
          Compress-Archive -Path "dist/${{ matrix.binary_name }}" -DestinationPath $asset -Force
          "ASSET_NAME=$asset" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Upload packaged asset
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}-asset
          path: ${{ env.ASSET_NAME }}

  publish_github_release:
    name: Publish GitHub Release assets
    runs-on: ubuntu-latest
    needs: [create_tag, publish_crates, build_cli_binaries]
    if: ${{ needs.publish_crates.result == 'success' && needs.build_cli_binaries.result == 'success' }}
    permissions:
      contents: write

    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ needs.create_tag.outputs.tag_name }}
        run: |
          gh release create "${TAG_NAME}" \
            --repo "${{ github.repository }}" \
            --title "${TAG_NAME}" \
            --generate-notes \
            dist/**/*.tar.gz dist/**/*.zip
