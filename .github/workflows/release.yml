name: Release

on:
  workflow_dispatch:

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  CARGO_REGISTRIES_CRATES_IO_PROTOCOL: sparse

jobs:
  create_tag:
    name: Bump version and create tag
    uses: ./.github/workflows/auto-version-tag.yml
    secrets: inherit
    permissions:
      contents: write

  quality_gate:
    name: Quality Gate
    runs-on: ubuntu-latest
    needs: create_tag
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          ref: ${{ needs.create_tag.outputs.tag_name }}

      - name: Setup Rust
        run: rustup update stable && rustup default stable

      - name: Cache Rust artifacts
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830  # v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Build (release)
        run: cargo build --workspace --release --locked

      - name: Install cargo-deny
        run: cargo deny --version 2>/dev/null || cargo install cargo-deny --locked

      - name: Unit tests + license check
        run: ./scripts/run_unit_and_license_check.sh

      - name: Clippy (deny warnings)
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

      - name: Deny vulnerable advisories
        run: cargo deny check advisories

      - name: Deny policy violations (bans + sources)
        run: cargo deny check bans sources

  publish_crates:
    name: Publish crates.io packages
    runs-on: ubuntu-latest
    needs: [create_tag, quality_gate]
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          ref: ${{ needs.create_tag.outputs.tag_name }}

      - name: Setup Rust
        run: rustup update stable && rustup default stable

      - name: Cache Rust artifacts
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830  # v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Login crates.io
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}
        run: |
          if [ -z "${CARGO_REGISTRY_TOKEN}" ]; then
            echo "CRATES_IO_TOKEN secret is required for release workflow"
            exit 1
          fi

      - name: Publish crates in dependency order
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}
        run: |
          publish_if_missing() {
            crate="$1"
            version="$(cargo metadata --no-deps --format-version 1 | python3 -c "import json,sys; data=json.load(sys.stdin); print(next(p['version'] for p in data['packages'] if p['name']=='$crate'))")"
            url="https://crates.io/api/v1/crates/${crate}/${version}"

            if curl --silent --show-error --fail "$url" >/dev/null 2>&1; then
              echo "${crate}@${version} already exists on crates.io. Skipping publish."
              return 0
            fi

            echo "Publishing ${crate}@${version} ..."
            cargo publish --locked -p "$crate"
          }

          # Publish in dependency order.
          # edgesentry-audit has no git deps — publishes unconditionally.
          publish_if_missing edgesentry-audit

          # edgesentry-inspect requires trilink-core to be published on
          # crates.io first, and edgesentry-inspect/Cargo.toml must reference
          # it as a crates.io dep (not a git dep) before this step can succeed.
          publish_if_missing edgesentry-inspect

  build_cli_binaries:
    name: Build eds (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    needs: [create_tag, quality_gate]
    permissions:
      contents: read
      id-token: write
      attestations: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary_name: eds
            archive_ext: tar.gz
          - os: macos-latest
            target: aarch64-apple-darwin
            binary_name: eds
            archive_ext: tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            binary_name: eds.exe
            archive_ext: zip

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          ref: ${{ needs.create_tag.outputs.tag_name }}

      - name: Setup Rust (target)
        run: rustup update stable && rustup default stable && rustup target add ${{ matrix.target }}

      - name: Cache Rust artifacts
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830  # v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-${{ matrix.target }}-cargo-

      - name: Build eds release binary
        run: cargo build --release --locked -p eds --target ${{ matrix.target }}

      - name: Package binary (unix)
        if: runner.os != 'Windows'
        shell: bash
        env:
          TAG_NAME: ${{ needs.create_tag.outputs.tag_name }}
        run: |
          ASSET_NAME="eds-${TAG_NAME}-${{ matrix.target }}.tar.gz"
          mkdir -p dist
          cp "target/${{ matrix.target }}/release/${{ matrix.binary_name }}" ./dist/
          tar -C dist -czf "$ASSET_NAME" "${{ matrix.binary_name }}"
          echo "ASSET_NAME=$ASSET_NAME" >> "$GITHUB_ENV"

      - name: Package binary (windows)
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          TAG_NAME: ${{ needs.create_tag.outputs.tag_name }}
        run: |
          $tag = "${env:TAG_NAME}"
          $asset = "eds-$tag-${{ matrix.target }}.zip"
          New-Item -ItemType Directory -Path dist -Force | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/${{ matrix.binary_name }}" "dist/${{ matrix.binary_name }}"
          Compress-Archive -Path "dist/${{ matrix.binary_name }}" -DestinationPath $asset -Force
          "ASSET_NAME=$asset" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Attest build provenance (SLSA)
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32  # v4.1.0
        with:
          subject-path: ${{ env.ASSET_NAME }}

      - name: Upload packaged asset
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: ${{ matrix.target }}-asset
          path: ${{ env.ASSET_NAME }}

  generate_sbom:
    name: Generate SBOM (CycloneDX)
    runs-on: ubuntu-latest
    needs: [create_tag, quality_gate]
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          ref: ${{ needs.create_tag.outputs.tag_name }}

      - name: Setup Rust
        run: rustup update stable && rustup default stable

      - name: Install cargo-cyclonedx
        run: cargo install cargo-cyclonedx --locked

      - name: Generate CycloneDX SBOMs
        run: cargo cyclonedx --format json --all

      - name: Collect SBOM artifacts
        env:
          TAG_NAME: ${{ needs.create_tag.outputs.tag_name }}
        run: |
          mkdir -p sbom-dist
          find . -name "*.cdx.json" -not -path "*/target/*" | while read f; do
            crate=$(basename "$(dirname "$f")")
            cp "$f" "sbom-dist/${crate}-${TAG_NAME}.cdx.json"
          done
          ls -la sbom-dist/

      - name: Upload SBOM artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: sbom
          path: sbom-dist/*.cdx.json

  publish_github_release:
    name: Publish GitHub Release assets
    runs-on: ubuntu-latest
    needs: [create_tag, publish_crates, build_cli_binaries, generate_sbom]
    if: ${{ needs.publish_crates.result == 'success' && needs.build_cli_binaries.result == 'success' }}
    permissions:
      contents: write

    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          path: dist

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ needs.create_tag.outputs.tag_name }}
        run: |
          gh release create "${TAG_NAME}" \
            --repo "${{ github.repository }}" \
            --title "${TAG_NAME}" \
            --generate-notes \
            dist/**/*.tar.gz dist/**/*.zip dist/sbom/*.cdx.json

  update_homebrew_tap:
    name: Update Homebrew tap formula
    runs-on: ubuntu-latest
    needs: [create_tag, publish_github_release]
    permissions:
      contents: read

    steps:
      - name: Generate GitHub App token (scoped to homebrew-tap)
        id: app-token
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3  # v3.1.1
        with:
          app-id: ${{ secrets.HOMEBREW_TAP_APP_ID }}
          private-key: ${{ secrets.HOMEBREW_TAP_APP_PRIVATE_KEY }}
          repositories: homebrew-tap

      - name: Compute checksums and update Formula/eds.rb
        env:
          TAG_NAME: ${{ needs.create_tag.outputs.tag_name }}
        run: |
          BASE_URL="https://github.com/edgesentry/edgesentry-rs/releases/download/${TAG_NAME}"
          MACOS_ASSET="eds-${TAG_NAME}-aarch64-apple-darwin.tar.gz"
          LINUX_ASSET="eds-${TAG_NAME}-x86_64-unknown-linux-gnu.tar.gz"

          curl -fsSL -o "${MACOS_ASSET}" "${BASE_URL}/${MACOS_ASSET}"
          curl -fsSL -o "${LINUX_ASSET}" "${BASE_URL}/${LINUX_ASSET}"

          SHA256_MACOS=$(sha256sum "${MACOS_ASSET}" | awk '{print $1}')
          SHA256_LINUX=$(sha256sum "${LINUX_ASSET}" | awk '{print $1}')

          cat > eds.rb <<FORMULA
          class Eds < Formula
            desc "EdgeSentry unified CLI for tamper-evident audit and IFC scan inspection"
            homepage "https://github.com/edgesentry/edgesentry-rs"
            version "${TAG_NAME#v}"
            license any_of: ["MIT", "Apache-2.0"]

            on_macos do
              on_arm do
                url "${BASE_URL}/${MACOS_ASSET}"
                sha256 "${SHA256_MACOS}"
              end
            end

            on_linux do
              on_intel do
                url "${BASE_URL}/${LINUX_ASSET}"
                sha256 "${SHA256_LINUX}"
              end
            end

            def install
              bin.install "eds"
            end

            test do
              assert_match version.to_s, shell_output("#{bin}/eds --version")
            end
          end
          FORMULA

      - name: Push formula to homebrew-tap
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          TAG_NAME: ${{ needs.create_tag.outputs.tag_name }}
        run: |
          git clone "https://x-access-token:${GH_TOKEN}@github.com/edgesentry/homebrew-tap.git" tap
          mkdir -p tap/Formula
          cp eds.rb tap/Formula/eds.rb
          cd tap
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add Formula/eds.rb
          git commit -m "eds ${TAG_NAME}"
          git push
