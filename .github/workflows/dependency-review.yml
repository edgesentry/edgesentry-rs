name: Dependency Review

on:
  pull_request:

permissions: {}

jobs:
  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Dependency Review
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high
          allow-licenses: MIT, Apache-2.0, ISC, BSD-2-Clause, BSD-3-Clause, Unicode-3.0, CC0-1.0, Zlib
          allow-dependencies-licenses: >-
            pkg:github/actions/checkout,
            pkg:github/actions/dependency-review-action,
            pkg:github/actions/attest-build-provenance,
            pkg:cargo/postgres,
            pkg:cargo/unicode-properties,
            pkg:cargo/cbindgen,
            pkg:cargo/axum,
            pkg:cargo/rusqlite,
            pkg:cargo/ahash,
            pkg:cargo/fallible-iterator,
            pkg:cargo/fallible-streaming-iterator,
            pkg:cargo/hashbrown,
            pkg:cargo/hashlink,
            pkg:cargo/libsqlite3-sys,
            pkg:cargo/pkg-config,
            pkg:cargo/vcpkg,
            pkg:cargo/rumqttc,
            pkg:cargo/mqttbytes,
            pkg:cargo/tokio-rustls,
            pkg:cargo/webpki-roots
          comment-summary-in-pr: always
