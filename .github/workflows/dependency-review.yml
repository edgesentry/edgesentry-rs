name: Dependency Review

on:
  pull_request:

permissions: {}

jobs:
  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Submit dependency snapshot
        uses: advanced-security/component-detection-dependency-submission-action@9c110eb34dee187cd9eca76a652b9f6a0ed22927  # v0.1.1
        continue-on-error: true

      - name: Dependency Review
        uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294  # v5.0.0
        with:
          retry-on-snapshot-warnings: true
          fail-on-severity: high
          allow-licenses: MIT, Apache-2.0, ISC, MIT-0, BSD-2-Clause, BSD-3-Clause, Unicode-3.0, CC0-1.0, Zlib, CDLA-Permissive-2.0
          allow-dependencies-licenses: >-
            pkg:github/actions/checkout,
            pkg:github/actions/dependency-review-action,
            pkg:github/actions/attest-build-provenance,
            pkg:github/actions/create-github-app-token,
            pkg:cargo/postgres,
            pkg:cargo/unicode-properties,
            pkg:cargo/cbindgen,
            pkg:cargo/dyn-eq,
            pkg:cargo/string-interner,
            pkg:cargo/colored,
            pkg:cargo/axum,
            pkg:cargo/rusqlite,
            pkg:cargo/ahash,
            pkg:cargo/fallible-iterator,
            pkg:cargo/fallible-streaming-iterator,
            pkg:cargo/hashbrown,
            pkg:cargo/hashlink,
            pkg:cargo/libsqlite3-sys,
            pkg:cargo/pkg-config,
            pkg:cargo/vcpkg,
            pkg:cargo/rumqttc,
            pkg:cargo/mqttbytes,
            pkg:cargo/tokio-rustls,
            pkg:cargo/webpki-roots
          # GHSA-82j2-j2ch-gfr8 = RUSTSEC-2026-0104: rustls-webpki panic on malformed CRL BIT STRING.
          # Affects rustls-webpki 0.101.7 (AWS SDK chain) and 0.102.8 (rumqttc / parquet transitive).
          # CRL checking is opt-in via RevocationOptions and is not used anywhere in this codebase.
          # Full rationale documented in deny.toml [advisories].ignore.
          allow-ghsas: GHSA-82j2-j2ch-gfr8
          comment-summary-in-pr: always
