name: Dependency Review

on:
  pull_request:

permissions: {}

jobs:
  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Dependency Review
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high
          allow-licenses: MIT, Apache-2.0, BSD-2-Clause, BSD-3-Clause, Unicode-3.0, CC0-1.0, Zlib
          allow-dependencies-licenses: >-
            pkg:github/actions/checkout,
            pkg:github/actions/dependency-review-action,
            pkg:github/actions/attest-build-provenance,
            pkg:cargo/postgres,
            pkg:cargo/unicode-properties,
            pkg:cargo/cbindgen
          comment-summary-in-pr: always
