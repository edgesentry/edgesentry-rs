name: CI

on:
  push:
    branches: ["main"]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  CARGO_REGISTRIES_CRATES_IO_PROTOCOL: sparse

jobs:
  build_and_test:
    name: Build and Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2

      - name: Build (release)
        run: cargo build --workspace --release

      - name: Unit tests (workspace)
        run: cargo test --workspace

      - name: Unit tests (ingest-api with s3)
        run: cargo test -p ingest-api --features s3

  license_check:
    name: OSS License Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-deny
        run: cargo install cargo-deny --locked

      - name: Check licenses (commercial-use policy)
        run: cargo deny check licenses

  release_readiness:
    name: Release Readiness (dry-run)
    runs-on: ubuntu-latest
    needs: [build_and_test, license_check]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2

      - name: Publish dry-run (dependency order)
        run: |
          cargo publish --dry-run --locked -p ledger-core
          cargo publish --dry-run --locked -p device-agent
          cargo publish --dry-run --locked -p ingest-api
          cargo publish --dry-run --locked -p audit-cli
