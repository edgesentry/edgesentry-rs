name: CI

on:
  push:
    branches: ["main"]
  pull_request:
  workflow_dispatch:

permissions: {}

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  CARGO_REGISTRIES_CRATES_IO_PROTOCOL: sparse

jobs:
  build_and_test:
    name: Build and Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        run: rustup update stable && rustup default stable

      - name: Cache Rust artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Build (release)
        run: cargo build --workspace --release

      - name: Unit tests (workspace)
        run: cargo test --workspace

      - name: Unit tests (edgesentry-rs with s3)
        run: cargo test -p edgesentry-rs --features s3

      - name: Unit tests (edgesentry-rs with transport-tls)
        run: cargo test -p edgesentry-rs --features transport-tls

  license_check:
    name: OSS License Check
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        run: rustup update stable && rustup default stable

      - name: Cache Rust artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Install cargo-deny
        run: cargo deny --version 2>/dev/null || cargo install cargo-deny --locked

      - name: Check licenses (commercial-use policy)
        run: cargo deny check licenses

  audit:
    name: Security Audit (cargo-audit)
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        run: rustup update stable && rustup default stable

      - name: Install cargo-audit
        run: cargo audit --version 2>/dev/null || cargo install cargo-audit --locked

      - name: Run security audit
        # RUSTSEC-2026-0049 (GHSA-pwjx-qhcg-rvj4): rustls-webpki CRL bug.
        # Two affected instances, no patch available for either:
        #   0.101.7 — AWS SDK → hyper-rustls 0.24 → rustls 0.21 (#125)
        #   0.102.8 — rumqttc 0.25 → rustls 0.22 (#166)
        # No CRL revocation calls in the codebase; unexploitable as-is.
        run: cargo audit --ignore RUSTSEC-2026-0049

  sast:
    name: SAST (Clippy + cargo-deny advisories)
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        run: rustup update stable && rustup default stable

      - name: Cache Rust artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Clippy (deny warnings)
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

      - name: Install cargo-deny
        run: cargo deny --version 2>/dev/null || cargo install cargo-deny --locked

      - name: Deny vulnerable advisories
        run: cargo deny check advisories

      - name: Deny policy violations (bans + sources)
        run: cargo deny check bans sources

  coverage:
    name: Test Coverage (cargo-llvm-cov)
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        run: rustup update stable && rustup default stable && rustup component add llvm-tools-preview

      - name: Cache Rust artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Install cargo-llvm-cov
        run: cargo llvm-cov --version 2>/dev/null || cargo install cargo-llvm-cov --locked

      - name: Generate coverage report
        # Exclude external-service tests (Postgres, S3, MQTT broker) via --exclude-from-test.
        # The ignored tests still compile so the coverage report is accurate.
        run: |
          cargo llvm-cov \
            --workspace \
            --features transport-http,transport-mqtt,transport-tls,async-ingest,buffer-sqlite,s3 \
            --ignore-filename-regex '(main\.rs|examples/)' \
            --lcov \
            --output-path lcov.info

      - name: Upload lcov artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-lcov
          path: lcov.info
          retention-days: 30

      - name: Print summary
        run: |
          cargo llvm-cov \
            --workspace \
            --features transport-http,transport-mqtt,transport-tls,async-ingest,buffer-sqlite,s3 \
            --ignore-filename-regex '(main\.rs|examples/)' \
            --summary-only 2>/dev/null || true

  release_readiness:
    name: Release Readiness (dry-run)
    runs-on: ubuntu-latest
    needs: [build_and_test, license_check, audit, sast]
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        run: rustup update stable && rustup default stable

      - name: Cache Rust artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Publish dry-run (edgesentry-rs)
        run: |
          cargo publish --dry-run --locked -p edgesentry-rs
