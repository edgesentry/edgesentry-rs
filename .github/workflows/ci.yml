name: CI

on:
  push:
    branches: ["main"]
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: '0 2 * * 2'  # Tuesday  02:00 UTC — macOS
    - cron: '0 2 * * 4'  # Thursday 02:00 UTC — Windows

permissions: {}

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  CARGO_REGISTRIES_CRATES_IO_PROTOCOL: sparse

jobs:
  build_and_test:
    name: Build and Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        # PRs and main-branch pushes: Ubuntu only (fast feedback).
        # Scheduled runs: Tuesday → macOS, Thursday → Windows.
        os: ${{ github.event.schedule == '0 2 * * 2' && fromJSON('["macos-latest"]') || github.event.schedule == '0 2 * * 4' && fromJSON('["windows-latest"]') || fromJSON('["ubuntu-latest"]') }}

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Setup Rust
        run: rustup update stable && rustup default stable

      - name: Cache Cargo registry
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-registry-

      - name: Cache build artifacts
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
        with:
          path: |
            ~/.cargo/bin/
            target/
          key: ${{ runner.os }}-cargo-target-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-target-

      - name: Build (release)
        run: cargo build --workspace --release

      - name: Unit tests (workspace)
        run: cargo test --workspace

      - name: Unit tests (edgesentry-audit with s3)
        run: cargo test -p edgesentry-audit --features s3

      - name: Unit tests (edgesentry-audit with transport-tls)
        run: cargo test -p edgesentry-audit --features transport-tls

      - name: Unit tests (edgesentry-audit with transport-mqtt-tls)
        run: cargo test -p edgesentry-audit --features transport-mqtt-tls

      - name: CLI integration tests (serve + serve-tls)
        run: cargo test -p eds --features transport-http,transport-tls --test cli_integration

  license_check:
    name: OSS License Check
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Setup Rust
        run: rustup update stable && rustup default stable

      - name: Cache Rust artifacts
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Install cargo-deny
        run: cargo deny --version 2>/dev/null || cargo install cargo-deny --locked

      - name: Check licenses (commercial-use policy)
        run: cargo deny check licenses

  audit:
    name: Security Audit (cargo-audit)
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Setup Rust
        run: rustup update stable && rustup default stable

      - name: Install cargo-audit
        run: cargo audit --version 2>/dev/null || cargo install cargo-audit --locked

      - name: Run security audit
        # All advisory ignores are documented in deny.toml [advisories].ignore
        # with full rationale. RUSTSEC-2026-0098/0099/0104: rustls-webpki
        # 0.101.7/0.102.8 pinned by upstream (AWS SDK → rustls 0.21;
        # rumqttc → rustls ^0.102); no patch in those series; CRL/URI/wildcard
        # SAN code paths not used in edgesentry-rs.
        run: >
          cargo audit
          --ignore RUSTSEC-2026-0049
          --ignore RUSTSEC-2026-0098
          --ignore RUSTSEC-2026-0099
          --ignore RUSTSEC-2026-0104

  sast:
    name: SAST (Clippy + cargo-deny advisories)
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Setup Rust
        run: rustup update stable && rustup default stable

      - name: Cache Rust artifacts
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Clippy (deny warnings)
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

      - name: Install cargo-deny
        run: cargo deny --version 2>/dev/null || cargo install cargo-deny --locked

      - name: Deny vulnerable advisories
        run: cargo deny check advisories

      - name: Deny policy violations (bans + sources)
        run: cargo deny check bans sources

  coverage:
    name: Test Coverage (cargo-llvm-cov)
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Setup Rust
        run: rustup update stable && rustup default stable && rustup component add llvm-tools-preview

      - name: Cache Rust artifacts
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Install cargo-llvm-cov
        run: cargo llvm-cov --version 2>/dev/null || cargo install cargo-llvm-cov --locked

      - name: Generate coverage report
        # Exclude external-service tests (Postgres, S3, MQTT broker) via --exclude-from-test.
        # The ignored tests still compile so the coverage report is accurate.
        run: |
          cargo llvm-cov \
            --workspace \
            --features transport-http,transport-mqtt,transport-mqtt-tls,transport-tls,async-ingest,buffer-sqlite,s3 \
            --ignore-filename-regex '(main\.rs|examples/)' \
            --lcov \
            --output-path lcov.info

      - name: Upload lcov artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: coverage-lcov
          path: lcov.info
          retention-days: 30

      - name: Print summary
        run: |
          cargo llvm-cov \
            --workspace \
            --features transport-http,transport-mqtt,transport-mqtt-tls,transport-tls,async-ingest,buffer-sqlite,s3 \
            --ignore-filename-regex '(main\.rs|examples/)' \
            --summary-only 2>/dev/null || true

  arm64_cross_compile:
    name: ARM64 Cross-Compile (aarch64-unknown-linux-gnu)
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Setup Rust
        run: rustup update stable && rustup default stable

      - name: Add aarch64 target
        run: rustup target add aarch64-unknown-linux-gnu

      - name: Install aarch64 cross-compiler
        run: sudo apt-get update -q && sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Cache Cargo registry
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
          key: aarch64-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: aarch64-cargo-registry-

      - name: Build eds for aarch64 (release)
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
        run: cargo build -p eds --release --target aarch64-unknown-linux-gnu

      - name: Verify binary architecture
        run: file target/aarch64-unknown-linux-gnu/release/eds | grep -q "ARM aarch64"

  release_readiness:
    name: Release Readiness (dry-run)
    runs-on: ubuntu-latest
    needs: [build_and_test, license_check, audit, sast]
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Setup Rust
        run: rustup update stable && rustup default stable

      - name: Cache Rust artifacts
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Publish dry-run (edgesentry-rs)
        run: |
          cargo publish --dry-run --locked -p edgesentry-audit
