name: Pages

on:
  workflow_run:
    workflows: ["CI"]
    branches: ["main"]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - name: Setup Rust
        run: rustup update stable && rustup default stable
      - name: Cache Rust artifacts
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7  # v5
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-
      - name: Install mdBook
        run: cargo install mdbook --locked
      - name: Build audit docs (EN)
        run: mdbook build docs/audit/en/
      - name: Build audit docs (JA)
        run: mdbook build docs/audit/ja/
      - name: Build inspect docs (EN)
        run: mdbook build docs/inspect/en/
      - name: Build inspect docs (JA)
        run: mdbook build docs/inspect/ja/
      - name: Build API docs (cargo doc)
        run: cargo doc --workspace --no-deps --locked
        env:
          RUSTDOCFLAGS: "--cfg docsrs"
      - name: Copy hub index pages
        run: |
          cp -r docs/hub/. docs/book/
          cp -r target/doc/. docs/book/api/
      - uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa  # v3
        with:
          path: docs/book/

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Deploy
        id: deploy
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e  # v4
