name: Pages

on:
  workflow_run:
    workflows: ["CI"]
    branches: ["main"]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Install mdBook
        run: cargo install mdbook --locked
      - name: Build audit docs (EN)
        run: mdbook build docs/audit/en/
      - name: Build audit docs (JA)
        run: mdbook build docs/audit/ja/
      - name: Build inspect docs (EN)
        run: mdbook build docs/inspect/en/
      - name: Build inspect docs (JA)
        run: mdbook build docs/inspect/ja/
      - name: Add root redirect
        run: |
          cat > docs/book/index.html <<'EOF'
          <!DOCTYPE html>
          <html>
            <head>
              <meta charset="utf-8">
              <meta http-equiv="refresh" content="0; url=/edgesentry-rs/audit/en/">
              <link rel="canonical" href="/edgesentry-rs/audit/en/">
            </head>
            <body>
              <p>Redirecting to <a href="/edgesentry-rs/audit/en/">English documentation</a>...</p>
            </body>
          </html>
          EOF
      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs/book/

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Deploy
        id: deploy
        uses: actions/deploy-pages@v4
