site_name: edgesentry-rs
site_description: Reusable Rust crates and CLI for sensor-to-seal compliance pipelines.
site_url: https://edgesentry.github.io/edgesentry-rs/
repo_url: https://github.com/edgesentry/edgesentry-rs
repo_name: edgesentry/edgesentry-rs
edit_uri: edit/main/docs/pipeline/

docs_dir: docs/pipeline

theme:
  name: material
  language: en
  palette:
    - scheme: default
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.top
    - search.highlight
    - content.action.edit
    - content.code.copy

plugins:
  - search
  - i18n:
      docs_structure: suffix
      languages:
        - locale: en
          default: true
          name: English
          build: true
        - locale: ja
          name: 日本語
          build: true
          nav_translations:
            Home: ホーム
            Introduction: はじめに
            Architecture: アーキテクチャ
            Quickstarts: クイックスタート
            Safety Monitoring: 安全監視
            Document Compliance: ドキュメントコンプライアンス
            Steps: パイプラインステップ
            Profile Authoring: プロファイル作成
            CLI Reference: CLIリファレンス

markdown_extensions:
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - tables
  - admonition

nav:
  - Home: index.md
  - Introduction: introduction.md
  - Architecture: architecture.md
  - Quickstarts:
    - Safety Monitoring: quickstart-safety-monitoring.md
    - Document Compliance: quickstart-document-compliance.md
  - Steps:
    - Step 1 - Ingest: step-1-ingest.md
    - Step 2 - Compute: step-2-compute.md
    - Step 3 - Evaluate: step-3-evaluate.md
    - Step 4 - Assess: step-4-assess.md
    - Step 5 - Explain: step-5-explain.md
    - Step 6 - Document: step-6-document.md
    - Step 7 - Seal: step-7-seal.md
  - Profile Authoring: profile-authoring.md
  - CLI Reference: cli-reference.md
