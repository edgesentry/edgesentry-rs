site_name: EdgeSentry-RS
site_description: Reusable Rust crates and CLI for sensor-to-seal compliance pipelines.
site_url: https://edgesentry.github.io/edgesentry-rs/
repo_url: https://github.com/edgesentry/edgesentry-rs
repo_name: edgesentry/edgesentry-rs
edit_uri: edit/main/docs/

docs_dir: docs

theme:
  name: material
  language: en
  palette:
    - scheme: default
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.top
    - navigation.tracking
    - search.highlight
    - content.action.edit
    - content.code.copy

plugins:
  - search

extra_javascript:
  - https://unpkg.com/mermaid@10/dist/mermaid.min.js

markdown_extensions:
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - tables
  - admonition

nav:
  - Home: index.md
  - Architecture & Pipeline:
    - Overview: pipeline/index.md
    - Tier Architecture: pipeline/tier-architecture.md
    - Tier Implementation: pipeline/tier-implementation.md
    - CV Adapter Spec: pipeline/ingest-cv-adapter.md
    - Crate Contracts: crates.md
    - C/C++ FFI Bridge: ffi-bridge.md
  - Security & Compliance:
    - Overview: security/index.md
    - Compliance Matrix: security/compliance-matrix.md
    - STRIDE Threat Model: security/threat-model.md
    - SBOM & Lifecycle: security/sbom-lifecycle.md
    - Key Management: security/key-management.md
  - Legal Admissibility: legal.md
  - Roadmaps:
    - Overview: roadmap/index.md
    - Core Pipeline: roadmap/core-pipeline.md
    - Feature - Inspect: roadmap/feature-inspect.md
    - Strategy - Compliance: roadmap/strategy-compliance.md
