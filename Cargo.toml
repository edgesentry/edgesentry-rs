[workspace]
members = [
  "crates/ledger-core",
  "crates/device-agent",
  "crates/ingest-api",
  "crates/audit-cli",
]
resolver = "2"

[workspace.package]
edition = "2021"
license = "MIT OR Apache-2.0"
version = "0.1.2"
repository = "https://github.com/yohei1126/immutable-trace"

[workspace.dependencies]
blake3 = "1.5"
ed25519-dalek = { version = "2.1", features = ["rand_core"] }
postcard = { version = "1.1", features = ["alloc"] }
serde = { version = "1", features = ["derive"] }
thiserror = "2"
clap = { version = "4.5", features = ["derive"] }
serde_json = "1"
hex = "0.4"
ledger-core = { version = "0.1.2", path = "crates/ledger-core" }
device-agent = { version = "0.1.2", path = "crates/device-agent" }
