[graph]
# Keep target list empty to evaluate all workspace targets.
targets = []

[advisories]
version = 2
db-urls = ["https://github.com/rustsec/advisory-db"]
# Vulnerabilities are denied by default in v2.
# yanked crates and unmaintained warnings surface automatically.
ignore = [
  # RUSTSEC-2025-0134: rustls-pemfile v2 is unmaintained; functionality merged
  # into rustls-pki-types.  rustls-pemfile is pulled in transitively by rustls
  # 0.23 → tokio-rustls / hyper-rustls (transport-tls feature).  No patch
  # available via upstream; upgrading requires rustls to drop the dep.
  # No direct call-site exposure in our code.
  { id = "RUSTSEC-2025-0134", reason = "rustls-pemfile pulled in transitively by rustls 0.23 chain; no patch available. Functionality superseded by rustls-pki-types but not yet adopted by rustls." },
]

[bans]
multiple-versions = "warn"
wildcards = "warn"
highlight = "all"

[licenses]
# Ignore private workspace crates and evaluate third-party deps.
private = { ignore = true }
confidence-threshold = 0.8
allow = [
  "MIT",
  "Apache-2.0",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "Unicode-3.0",
  "CC0-1.0",
  "Zlib",
  # ISC: permissive, OSI/FSF-approved, functionally equivalent to MIT.
  # Used by: aws-lc-rs, aws-lc-sys, ring, rustls-webpki, untrusted.
  "ISC",
  # MIT-0: MIT with the attribution clause removed; more permissive than MIT.
  # Used by: aws-lc-sys (one sub-component).
  "MIT-0",
  # webpki-roots (via ureq → edgesentry-inspect) uses the Community Data
  # License Agreement Permissive 2.0.  It is a permissive, attribution-only
  # license with no copyleft restrictions — safe for commercial use.
  "CDLA-Permissive-2.0",
]

[[licenses.exceptions]]
# cbindgen is a build-only header generator (never linked into outputs).
# MPL-2.0 copyleft does not extend to generated artifacts or our source.
allow = ["MPL-2.0"]
name = "cbindgen"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = ["https://github.com/edgesentry/trilink-core"]
