[book]
title = "edgesentry-rs"
description = "Tamper-evident audit log PoC built in Rust from IoT devices to cloud services."
authors = ["edgesentry-rs contributors"]
language = "en"
src = "src"

[build]
build-dir = "book/en"

[output.html]
git-repository-url = "https://github.com/edgesentry/edgesentry-rs"
edit-url-template = "https://github.com/edgesentry/edgesentry-rs/edit/main/docs/src/{path}"
additional-js = ["theme/lang-switcher.js"]
